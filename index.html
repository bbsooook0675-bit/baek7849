<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 오목 (Gomoku Online)</title>
    <link rel="stylesheet" href="style.css">
    <!-- PeerJS for P2P connection -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>온라인 오목</h1>
        
        <div id="connection-panel">
            <div class="mode-selection">
                <button id="ai-mode-btn">AI와 대결하기 (혼자하기)</button>
                <div class="divider">또는 온라인 대전</div>
            </div>
            
            <div class="status-box">
                <p id="my-peer-id-display">내 ID: <span id="my-peer-id" class="code">생성 중...</span></p>
                <button id="copy-id-btn">ID 복사</button>
            </div>
            
            <div class="join-box">
                <input type="text" id="opponent-id-input" placeholder="상대방 ID 입력">
                <button id="connect-btn">연결하기</button>
            </div>
            
            <p id="connection-status">상대방을 기다리는 중이거나 ID를 입력하여 연결하세요.</p>
        </div>

        <div id="game-area" class="hidden">
            <div class="game-info">
                <button id="back-to-menu-btn">메뉴로</button>
                <span id="turn-indicator">대기 중...</span>
                <button id="reset-btn" style="display: none;">다시 하기</button>
            </div>
            <div id="board"></div>
        </div>

        <!-- Disqus Comments Section -->
        <div id="comments-section">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = window.location.href;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = 'gomoku-online-baek7849'; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://skkbaek22.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
